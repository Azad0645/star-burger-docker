services:
  db:
    image: postgres:16
    container_name: starburger-db
    environment:
      POSTGRES_DB: starburger
      POSTGRES_USER: starburger_user
      POSTGRES_PASSWORD: starburger_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: starburger-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://starburger_user:starburger_password@db:5432/starburger
    depends_on:
      - db
      - frontend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: starburger-frontend
    command: ./node_modules/.bin/parcel watch bundles-src/index.js --dist-dir bundles --public-url=./
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app

volumes:
  media_data:
  postgres_data:
  frontend_node_modules:
